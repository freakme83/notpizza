<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="A small top-down pizzeria management game." />
    <title>you are not pizza</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="wrap">
      <canvas id="game" width="960" height="620" aria-label="you are not pizza game"></canvas>

      <div id="gameControls" class="hidden" aria-label="Game controls">
        <button id="pauseBtn" type="button" aria-pressed="false">Pause</button>
        <button id="restartBtn" type="button">Restart</button>
      </div>

      <div id="pauseOverlay" class="hidden" role="status" aria-live="polite">
        <strong>Paused</strong>
        <span>Press P or Escape to continue</span>
      </div>

      <div id="hireWrap" class="hidden">
        <div id="hireMenu" class="hidden" role="menu">
          <button data-type="normal" role="menuitem">Waiter · $25</button>
          <button data-type="fast" role="menuitem">Fast waiter · $35</button>
          <button data-type="chef" role="menuitem">Chef · $100</button>
        </div>
        <button id="hireBtn" aria-haspopup="true">Hire waiter ▾</button>
      </div>

      <div id="start" role="button" tabindex="0">
        <h1>you are not pizza</h1>
        <p>WASD / Arrows to move · E to act · click ingredients at Prep</p>
        <span>click to start</span>
      </div>
    </div>
    <script src="main.js?v=phase6"></script>
  </body>
</html>
